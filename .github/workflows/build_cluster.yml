name: Build_Cluster

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - 'feature/cluster**'
      - 'fix/cluster**'
    paths:
      - 'apps/Cluster/qtApp/**'

jobs:
  build:
    runs-on: [self-hosted, Linux, X64, Docker]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute short sha
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build cross-compile Docker image
        run: |
          docker build -f apps/Cluster/Cross_Compile/Dockerfile -t cross-compile .

      - name: Extract QT
        run: |
          CONTAINER_ID=$(docker create cross-compile)
          docker cp $CONTAINER_ID:/build/project/qtAppExec ./qtApp
          docker rm $CONTAINER_ID

      - name: Create GitHub Release and upload binary
        uses: softprops/action-gh-release@v1
        with:
          tag_name: cluster-${{ steps.vars.outputs.SHORT_SHA }}
          name: Cluster (cluster-${{ steps.vars.outputs.SHORT_SHA }})
          files: |
            qtApp
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
