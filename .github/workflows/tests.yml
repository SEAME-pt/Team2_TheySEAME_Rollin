name: C++ CI with Qt6 and GoogleTest

on:
  pull_request:
    branches:
      - "develop"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            qt6-base-dev \
            qt6-serialbus-dev \
            qt6-connectivity-dev \
            libgtest-dev \
            libsocketcan-dev

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Pack build directory
        run: |
          tar -czf build.tar.gz -C build .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: build.tar.gz

  qtt-tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Unpack build
        run: mkdir -p build && tar -xzf build.tar.gz -C build

      - name: Install runtime dependencies (Qt + xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev \
            qt6-serialbus-dev \
            qt6-connectivity-dev \
            xvfb \
            cmake

      - name: Run Qt tests only (labelled "Qt")
        run: xvfb-run ctest --rerun-failed --output-on-failure --test-dir build -L Qt

  other-tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact

      - name: Unpack build
        run: mkdir -p build && tar -xzf build.tar.gz -C build

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev \
            qt6-serialbus-dev \
            qt6-connectivity-dev \
            xvfb \
            cmake

      - name: Run non-Qt tests (exclude label "Qt")
        run: ctest --rerun-failed --output-on-failure --test-dir build -LE Qt
