name: Code Formatter

on:
  pull_request:
    types: [opened, synchronize, reopened]
#    branches-ignore:
#      - main
    path:
      - 'apps/Cluster'

jobs:
  formatter:
    runs-on: ubuntu-latest

    steps:
      - name: Fetching repo
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 2

      - name: Log In to GHCR and Pull image
        run: |
          echo "${{ secrets.CLANG_KEY }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ghcr.io/seame-pt/team2_theyseame_rollin/clang-format_docker:latest

      - name: Get C/C++ files
        id: changed_files
        run: echo "FILES=$(git diff --name-only HEAD~1 HEAD | grep -P '\.(c|cpp|h|hpp)(?!.)')" >> $GITHUB_OUTPUT

      - name: Run the llvm docker with clang-format
        run: chmod +x scripts/actions/formatter.sh && ./scripts/actions/formatter.sh ${{ steps.changed_files.outputs.files }}

