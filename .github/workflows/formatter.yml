name: Code Formatter

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches-ignore:
      - main
    paths:
      - 'apps/Cluster/**'

jobs:
  formatter:
    runs-on: ubuntu-latest

    steps:
      - name: Fetching repo
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 2

      - name: Log In to GHCR and Pull image
        run: |
          echo "${{ secrets.CLANG_KEY }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ghcr.io/seame-pt/team2_theyseame_rollin/clang-format_docker:latest

      - name: Run the llvm docker with clang-format
        run: chmod +x scripts/actions/formatter.sh && ./scripts/actions/formatter.sh

