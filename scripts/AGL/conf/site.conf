# mylayer
IMAGE_INSTALL:append = " util-scripts"

# Devel recipes
IMAGE_INSTALL:append = " cmake raspi-utils raspi-gpio spitools can-utils libsocketcan ntp grpc protobuf i2c-tools v4l-utils"

# QT recipes
IMAGE_INSTALL:append = " qtbase qtmultimedia qtquick3d qtdeclarative qtwayland qtserialbus qtpositioning"

# Kuksa recipes
IMAGE_INSTALL:append = " kuksa-databroker kuksa-can-provider kuksa-client"

# RPI Hailo
IMAGE_INSTALL:append = " hailo-pci hailortcli hailo-firmware libhailort packagegroup-hailo-hailort"

# RPI Camera
IMAGE_INSTALL:append = " rpi-libcamera rpicam-apps pipewire"

# Touchscreen overlay for RPI5
RPI_KERNEL_DEVICETREE_OVERLAYS:append = "overlays/vc4-kms-dsi-waveshare-panel.dtbo"

DISTRO_FEATURES:append = " systemd"

KERNEL_SPLIT_MODULES = "0"

# Config.txt and Overlays
ENABLE_I2C = "1"
KERNEL_MODULE_AUTOLOAD:rpi:append = " i2c-dev i2c-bcm2708"
ENABLE_CAN = "1"
CAN_OSCILLATOR = "8000000"
VIDEO_CAMERA  = "1"
RASPBERRYPI_CAMERA_V3 = "1"

PREFERRED_PROVIDER_libcamera ?= "rpi-libcamera"

PARALLEL_MAKE = "-j 8"
BB_NUMBER_THREADS = "16"
SSTATE_DIR = "${HOME}/sstate-cache"
DL_DIR = "${HOME}/downloads"
INHERIT = "rm_work"
RM_OLD_IMAGE = "1"
