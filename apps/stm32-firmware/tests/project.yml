:project:
  :use_exceptions: FALSE
  :use_test_preprocessor: TRUE
  :use_auxiliary_dependencies: TRUE
  :build_root: build/ceedling/
  :release_build: TRUE
  :test_file_prefix: test_
  :which_ceedling: gem
  :ceedling_version: 0.31.1

:release_build:
  :output: speed_release
  :use_assembly: FALSE

:environment:

:extension:
  :executable: .out

:paths:
  :test:
    - tests/
    - tests/unit/
  :source:
    - ../Core/Src/Sensors/
  :include:
    - ../Core/Inc/
    - ../Core/Src/Sensors/
    - tests/
    - tests/mocks/
  :libraries:
    - ../libs/googletest/lib/

:defines:
  :common: &common_defines
    - UNIT_TEST
    - PULSES_PER_REV=10
  :test:
    - *common_defines
    - TEST
  :test_preprocess:
    - *common_defines
    - TEST

:cmock:
  :mock_prefix: mock_
  :when_no_prototypes: :warn
  :enforce_strict_ordering: TRUE
  :plugins:
    - :ignore
    - :callback
    - :array
    - :return_thru_ptr
  :treat_as:
    uint8:    HEX8
    uint16:   HEX16
    uint32:   HEX32
    int8:     INT8
    int16:    INT16
    int32:    INT32
  :mock_path: tests/mocks/
  :verbosity: 3
  :unity_helper: FALSE

:gcov:
  :reports:
    - HtmlDetailed
  :gcovr:
    :html_medium_threshold: 75
    :html_high_threshold: 90

:libraries:
  :placement: :end
  :flag: "-l${1}"
  :path_flag: "-L ${1}"
  :system: []
  :test: []
  :release: []

:plugins:
  :load_paths:
    - "#{Ceedling.load_path}"
  :enabled:
    - stdout_pretty_tests_report
    - module_generator
    - gcov

:module_generator:
  :project_root: ./
  :source_root: ../Core/Src/Sensors/
  :inc_root: ../Core/Inc/
  :test_root: tests/unit/

:tools:
  :test_compiler:
    :executable: g++
    :name: 'GNU G++ Compiler'
    :stderr_redirect: :none
    :optional: FALSE
    :arguments:
      - -I"$": COLLECTION_PATHS_TEST_TOOLCHAIN_INCLUDE
      - -I"$": COLLECTION_PATHS_TEST_SUPPORT_SOURCE_INCLUDE_VENDOR
      - -D$: COLLECTION_DEFINES_TEST_AND_VENDOR
      - -DGTEST_HAS_PTHREAD=0
      - -std=c++11
      - -Wall
      - -Wextra
      - -g
      - -c ${1}
      - -o ${2}
  :test_linker:
    :executable: g++
    :name: 'GNU G++ Linker'
    :stderr_redirect: :none
    :optional: FALSE
    :arguments:
      - ${1}
      - -lgtest
      - -lgtest_main
      - -lpthread
      - -o ${2}
