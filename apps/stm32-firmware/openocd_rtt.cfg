# OpenOCD configuration for STM32U585 + ST-Link V3 + SEGGER RTT bridge
# Usage: openocd -f openocd_rtt.cfg

# ---- Interface: ST-Link V3 in native DAP mode ----
source [find interface/stlink-dap.cfg]
transport select dapdirect_swd

# ---- Target: STM32U5x ----
source [find target/stm32u5x.cfg]

# ---- Adapter speed (4 MHz for reliable SWD) ----
adapter speed 4000

# ---- RTT configuration ----
# RTT control block address from linker map (_SEGGER_RTT = 0x20004218)
# Search range: 32KB from SRAM start to find "SEGGER RTT" magic ID.
# Wider range tolerates address changes across rebuilds.
rtt setup 0x20000000 0x8000 "SEGGER RTT"

# ---- After init: start RTT and open TCP server for SystemView ----
init

# Start RTT polling (reads RTT buffers from target RAM via SWD)
rtt start

# Forward RTT channel 1 (SystemView data) to TCP port 19111
# SystemView connects to localhost:19111
rtt server start 19111 1

# Also forward RTT channel 0 (terminal) for printf debugging
rtt server start 19112 0

echo "=== OpenOCD RTT bridge ready ==="
echo "SystemView: connect to localhost:19111"
echo "RTT terminal: telnet localhost 19112"
echo "================================"
